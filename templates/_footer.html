<footer class="app-footer">
    <div class="app-footer-inner">
        <a class="app-footer-brand" href="{{ url_for('home') }}">
            <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M4.3 13.2c0-5 4-9 9-9h5.5v5.5c0 5-4 9-9 9H4.3z"></path>
                <path d="M6.3 16.5c3.7-.2 6.8-2.1 9.1-5.3"></path>
            </svg>
            <span>SkinAnalysis AI</span>
        </a>

        <nav class="app-footer-nav" aria-label="Footer navigation">
            <a href="{{ url_for('home') }}">Home</a>
            {% if session.get('user_id') %}

            <a href="{{ url_for('analyzer', _anchor='dashboard-history-view') }}">History</a>
            <a href="{{ url_for('settings') }}">Settings</a>
            {% else %}
            <a href="{{ url_for('login') }}">Login</a>
            <a href="{{ url_for('signup') }}">Sign Up</a>
            {% endif %}
        </nav>

        <p class="app-footer-copy">2026 SkinAnalysis AI. All rights reserved.</p>

</footer>
