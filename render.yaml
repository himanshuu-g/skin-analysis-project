services:
  - type: web
    name: skin-care-web
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --bind 0.0.0.0:$PORT app:app
    autoDeploy: true
    envVars:
      - key: SECRET_KEY
        sync: false
      - key: SESSION_COOKIE_SECURE
        value: "1"
      - key: FLASK_DEBUG
        value: "0"
      - key: MONGO_URI
        sync: false
      - key: MONGO_DB_NAME
        value: skin_analysis
      - key: ADMIN_EMAILS
        sync: false
